# Railway configuration for Next.js
[build]
command = ".railwaydeploy.sh"

[deploy]
preDeployCommand = "npx prisma generate && npx prisma db execute --file prisma/sql/predeploy_user_columns.sql --schema prisma/schema.prisma"

[env]
NODE_ENV = "production"
NPM_CONFIG_UPDATE_NOTIFIER = "false"
NEXT_TELEMETRY_DISABLED = "1"
FORCE_CLEAN_BUILD = "1"
